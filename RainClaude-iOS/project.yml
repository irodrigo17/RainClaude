name: RainClaude
options:
  bundleIdPrefix: com.rainclaude
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  RainClaude:
    type: application
    platform: iOS
    sources:
      - path: RainClaude
    settings:
      base:
        INFOPLIST_FILE: RainClaude/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rainclaude.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "RainClaude can use your location to center the map."
